version: '3.8'

services:
  backend:
    build: ./backend
    container_name: drf_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=your-production-secret-key
      - ALLOWED_HOSTS=localhost,127.0.0.1

  frontend:
    build: ./frontend
    container_name: vite_frontend
    ports:
      - "5173:5173"  # Стандартный порт Vite наружу
    depends_on:
      - backend

volumes:
  static_volume:
  media_volume: