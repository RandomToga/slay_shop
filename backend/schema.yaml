components:
  schemas:
    Brand:
      type: object
      properties:
        brand_id:
          type: integer
          readOnly: true
          title: ID бренда
        brand_name:
          type: string
          title: Название бренда
          maxLength: 150
        brand_country:
          type: string
          nullable: true
          title: Страна бренда
          maxLength: 100
        brand_description:
          type: string
          nullable: true
          title: Описание бренда
      required:
      - brand_id
      - brand_name
    CartItem:
      type: object
      properties:
        cart_item_id:
          type: integer
          readOnly: true
          title: ID позиции корзины
        product_id:
          type: integer
          title: ID товара
        product_name:
          type: string
          readOnly: true
        product_quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Количество товара
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - cart_item_id
      - price
      - product_id
      - product_name
      - total_price
    Category:
      type: object
      properties:
        category_id:
          type: integer
          readOnly: true
          title: ID категории
        category_name:
          type: string
          title: Название категории
          maxLength: 150
        category_description:
          type: string
          nullable: true
          title: Описание категории
      required:
      - category_id
      - category_name
    DeliveryAddress:
      type: object
      properties:
        address_id:
          type: integer
          readOnly: true
          title: ID адреса
        city:
          type: string
          title: Город
          maxLength: 100
        street:
          type: string
          title: Улица
          maxLength: 100
        house:
          type: string
          title: Дом
          maxLength: 20
        apartment:
          type: string
          nullable: true
          title: Квартира
          maxLength: 20
      required:
      - address_id
      - city
      - house
      - street
    Login:
      type: object
      description: |-
        Кастомный сериализатор для получения JWT токенов.
        Автоматически использует email как USERNAME_FIELD.
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Order:
      type: object
      properties:
        order_id:
          type: integer
          readOnly: true
          title: ID заказа
        user_id:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OrderStatus'
          readOnly: true
        payment_method:
          allOf:
          - $ref: '#/components/schemas/PaymentMethod'
          readOnly: true
        payment_method_id:
          type: integer
          title: ID способа оплаты
          writeOnly: true
        address_id:
          type: integer
          title: ID адреса
          writeOnly: true
        delivery_address:
          allOf:
          - $ref: '#/components/schemas/DeliveryAddress'
          readOnly: true
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        order_date:
          type: string
          format: date-time
          readOnly: true
          title: Дата заказа
      required:
      - address_id
      - delivery_address
      - items
      - order_date
      - order_id
      - payment_method
      - payment_method_id
      - status
      - total_amount
      - user_id
    OrderItem:
      type: object
      properties:
        order_item_id:
          type: integer
          readOnly: true
          title: ID позиции заказа
        product_id:
          type: integer
          readOnly: true
        product_name:
          type: string
          readOnly: true
        product_quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          title: Количество товара
        price_at_order:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        subtotal:
          type: string
          readOnly: true
      required:
      - order_item_id
      - price_at_order
      - product_id
      - product_name
      - product_quantity
      - subtotal
    OrderStatus:
      type: object
      properties:
        status_id:
          type: integer
          readOnly: true
          title: ID статуса
        status_name:
          type: string
          title: Название статуса
          maxLength: 100
        status_description:
          type: string
          nullable: true
          title: Описание статуса
      required:
      - status_id
      - status_name
    OrderStatusUpdate:
      type: object
      description: Только для обновления статуса заказа менеджером.
      properties:
        status_id:
          type: integer
          title: ID статуса
      required:
      - status_id
    PaginatedBrandList:
      type: object
